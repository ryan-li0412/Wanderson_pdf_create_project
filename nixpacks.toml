[phases.setup]
nixPkgs = ["nodejs_20", "python311", "gcc"]

[phases.install]
cmds = [
  "npm ci --omit=dev",
  "python3 -m venv /app/.venv",
  "/app/.venv/bin/pip install pymupdf==1.27.2.2"
]

[start]
cmd = "export LD_LIBRARY_PATH=$(find /nix/store -name 'libstdc++.so.6' 2>/dev/null | head -1 | xargs dirname 2>/dev/null):$LD_LIBRARY_PATH && node server.js"
