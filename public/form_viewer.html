<title>Formulário de Cidadania Polonesa</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #888; font-family: Arial, sans-serif; }
  .page-wrap { display: flex; justify-content: center; margin: 16px 0; }
  .page {
    position: relative;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    background: #fff;
    overflow: hidden;
  }
  .page img { display: block; }
  .row-input {
    position: absolute;
    background: rgba(255, 255, 180, 0.5);
    border: none;
    outline: none;
    color: transparent;
    caret-color: transparent;
    z-index: 10;
    cursor: text;
    font-size: 11px;
    padding: 0 3px;
    text-transform: uppercase;
    transition: background 0.1s, border 0.1s, color 0.1s;
  }
  .row-input:focus {
    background: #fff;
    border: 1px solid #c00;
    color: #000;
    caret-color: #000;
    box-shadow: 0 0 0 1px #c00;
  }
  .char-cell {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, sans-serif;
    font-size: 9px;
    color: #000;
    text-transform: uppercase;
    pointer-events: none;
    z-index: 5;
  }
  .narr-field {
    position: absolute;
    background: transparent;
    border: none;
    outline: none;
    padding: 0 2px;
    text-transform: uppercase;
    font-family: Arial, sans-serif;
    font-size: 9px;
    line-height: 12px;
    color: #000;
    resize: none;
    z-index: 10;
  }
  .submit-bar {
    display: flex;
    justify-content: center;
    padding: 24px;
  }
  .submit-btn {
    background: #1a5fb4;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 14px 48px;
    font-size: 16px;
    cursor: pointer;
    font-weight: bold;
  }
  .submit-btn:hover { background: #1345a0; }
</style>
</head>

<script>
  // Uppercase while typing, distribute to boxes on blur
  document.querySelectorAll('.row-input').forEach(inp => {
    inp.addEventListener('input', function() {
      this.value = this.value.toUpperCase();
    });
    inp.addEventListener('blur', function() {
      const val = this.value;
      const field = this.dataset.field;
      document.querySelectorAll(`.char-cell[data-field="${field}"]`).forEach(span => {
        const i = parseInt(span.dataset.idx);
        span.textContent = val[i] || '';
      });
    });
  });

  // Submit
  document.getElementById('mainForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const data = {};

    document.querySelectorAll('.row-input').forEach(inp => {
      const f = inp.dataset.field;
      data[f] = (data[f] || '') + inp.value;
    });

    document.querySelectorAll('.narr-field').forEach(ta => {
      data[ta.name] = ta.value.toUpperCase();
    });

    fetch('/generate-pdf', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    })
    .then(r => r.blob())
    .then(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'formulario_cidadania.pdf';
      a.click();
    });
  });
</script>
